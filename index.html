<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three Cube Comments</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .app {
      display: grid;
      grid-template-columns: 1fr 360px;
      min-height: 100vh;
    }

    .viewer {
      position: relative;
      background: linear-gradient(180deg, #eef2f7 0%, #dde4ec 100%);
      overflow: hidden;
    }

    #canvasWrap {
      width: 100%;
      height: 100vh;
    }

    .topbar {
      position: absolute;
      left: 16px;
      top: 16px;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-width: calc(100% - 32px);
    }

    .topbar button {
      border: none;
      background: rgba(17, 24, 39, 0.92);
      color: white;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .topbar button.secondary {
      background: rgba(107, 114, 128, 0.92);
    }

    .topbar button.danger {
      background: rgba(185, 28, 28, 0.92);
    }

    .status {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 20;
      background: rgba(255,255,255,0.92);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      max-width: 520px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .sidebar {
      background: white;
      border-left: 1px solid #e5e7eb;
      padding: 18px;
      overflow: auto;
    }

    .sidebar h2 {
      margin-top: 0;
    }

    .hint {
      font-size: 14px;
      line-height: 1.5;
      color: #4b5563;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .entry-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .entry {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      background: #fafafa;
    }

    .entry strong {
      display: block;
      margin-bottom: 6px;
    }

    .entry .small {
      color: #6b7280;
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 8px;
    }

    .entry .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .entry .actions button {
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      color: white;
      background: #374151;
      font-size: 13px;
    }

    .entry .actions button.danger {
      background: #b91c1c;
    }

    .empty {
      color: #6b7280;
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-left: none;
        border-top: 1px solid #e5e7eb;
      }

      #canvasWrap {
        height: 68vh;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="viewer">
      <div class="topbar">
        <button id="resetViewBtn" type="button">Ansicht zurücksetzen</button>
        <button id="exportBtn" type="button" class="secondary">JSON exportieren</button>
        <button id="clearBtn" type="button" class="danger">Alle löschen</button>
      </div>

      <div id="canvasWrap"></div>
      <div class="status" id="status">Bereit. Auf eine Würfelfläche klicken, um einen Kommentar zu setzen.</div>
    </section>

    <aside class="sidebar">
      <h2>Kommentare</h2>
      <div class="hint">
        Gespeichert werden:
        <br>• Face
        <br>• UV-Koordinate auf der Fläche
        <br>• 3D-Punkt auf dem Würfel
        <br>• Kommentar
        <br>• Zeitstempel
      </div>
      <div class="entry-list" id="entries"></div>
    </aside>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
